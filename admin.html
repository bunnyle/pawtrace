<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PawTrace AI — 管理后台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg: #0D0D1A;
            --surface: #141427;
            --surface2: #1C1C35;
            --border: rgba(199, 125, 255, 0.18);
            --pink: #FF6B9D;
            --purple: #C77DFF;
            --teal: #00D4B1;
            --yellow: #FFD166;
            --text: #F0EEFF;
            --text-muted: #8B87B0;
            --radius: 20px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            width: 240px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 100;
            padding: 24px 16px;
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 8px 28px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 24px;
        }

        .sidebar-logo .paw {
            font-size: 1.4rem;
        }

        .sidebar-logo-text {
            font-family: 'Nunito', sans-serif;
            font-weight: 900;
            font-size: 1.1rem;
        }

        .logo-ai {
            background: linear-gradient(90deg, var(--pink), var(--purple));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .admin-badge {
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: var(--purple);
            background: rgba(199, 125, 255, .12);
            border: 1px solid rgba(199, 125, 255, .25);
            padding: 2px 8px;
            border-radius: 100px;
            margin-top: 2px;
        }

        .nav-section-label {
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: var(--text-muted);
            padding: 0 8px;
            margin-bottom: 8px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-muted);
            transition: background var(--transition), color var(--transition);
            text-decoration: none;
            margin-bottom: 4px;
        }

        .nav-item:hover {
            background: var(--surface2);
            color: var(--text);
        }

        .nav-item.active {
            background: linear-gradient(135deg, rgba(255, 107, 157, .15), rgba(199, 125, 255, .15));
            color: var(--text);
            border: 1px solid rgba(199, 125, 255, .2);
        }

        .nav-item .nav-icon {
            font-size: 1.1rem;
            width: 20px;
            text-align: center;
        }

        .sidebar-bottom {
            margin-top: auto;
            border-top: 1px solid var(--border);
            padding-top: 20px;
        }

        .user-chip {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--surface2);
            border-radius: 12px;
            padding: 10px 12px;
            margin-bottom: 12px;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--pink), var(--purple));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: 700;
            flex-shrink: 0;
        }

        .user-name {
            font-size: 0.85rem;
            font-weight: 600;
        }

        .user-role {
            font-size: 0.72rem;
            color: var(--text-muted);
        }

        .btn-logout {
            width: 100%;
            background: rgba(255, 107, 157, .1);
            border: 1px solid rgba(255, 107, 157, .2);
            color: var(--pink);
            border-radius: 10px;
            padding: 9px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            transition: background var(--transition);
        }

        .btn-logout:hover {
            background: rgba(255, 107, 157, .2);
        }

        /* Main content */
        .main {
            margin-left: 240px;
            padding: 32px;
        }

        .page-header {
            margin-bottom: 32px;
        }

        .page-title {
            font-family: 'Nunito', sans-serif;
            font-weight: 900;
            font-size: 1.8rem;
        }

        .page-sub {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 4px;
        }

        /* Stats cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 28px;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px 24px;
        }

        .stat-card-icon {
            font-size: 1.6rem;
            margin-bottom: 12px;
        }

        .stat-card-val {
            font-family: 'Nunito', sans-serif;
            font-weight: 900;
            font-size: 2rem;
            line-height: 1;
        }

        .stat-card-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .stat-card.pink {
            border-color: rgba(255, 107, 157, .3);
        }

        .stat-card.purple {
            border-color: rgba(199, 125, 255, .3);
        }

        .stat-card.teal {
            border-color: rgba(0, 212, 177, .3);
        }

        .stat-card.yellow {
            border-color: rgba(255, 209, 102, .3);
        }

        .stat-card.pink .stat-card-val {
            color: var(--pink);
        }

        .stat-card.purple .stat-card-val {
            color: var(--purple);
        }

        .stat-card.teal .stat-card-val {
            color: var(--teal);
        }

        .stat-card.yellow .stat-card-val {
            color: var(--yellow);
        }

        /* Content grid */
        .content-row {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 20px;
            margin-bottom: 20px;
        }

        /* Panels */
        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }

        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 24px;
            border-bottom: 1px solid var(--border);
        }

        .panel-title {
            font-family: 'Nunito', sans-serif;
            font-weight: 800;
            font-size: 1rem;
        }

        .panel-body {
            padding: 20px 24px;
        }

        .panel-action {
            font-size: 0.8rem;
            color: var(--purple);
            cursor: pointer;
            background: none;
            border: none;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
        }

        .panel-action:hover {
            text-decoration: underline;
        }

        /* History table */
        .history-table {
            width: 100%;
            border-collapse: collapse;
        }

        .history-table th {
            text-align: left;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: .08em;
            text-transform: uppercase;
            color: var(--text-muted);
            padding: 0 12px 12px;
        }

        .history-table td {
            padding: 10px 12px;
            border-top: 1px solid var(--border);
        }

        .history-table tr:hover td {
            background: var(--surface2);
        }

        .history-thumb {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            object-fit: cover;
            background: var(--surface2);
            display: block;
        }

        .thumb-placeholder {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: var(--surface2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .style-tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 0.72rem;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 100px;
            text-transform: uppercase;
        }

        .style-tag.kawaii {
            background: rgba(255, 107, 157, .15);
            color: var(--pink);
        }

        .style-tag.minimal {
            background: rgba(199, 125, 255, .15);
            color: var(--purple);
        }

        .style-tag.stamp {
            background: rgba(255, 209, 102, .15);
            color: var(--yellow);
        }

        .no-history {
            text-align: center;
            color: var(--text-muted);
            padding: 40px 0;
            font-size: 0.9rem;
        }

        /* API Key panel */
        .api-key-display {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 14px;
            font-family: monospace;
            font-size: 0.85rem;
            color: var(--text-muted);
            word-break: break-all;
            margin-bottom: 12px;
            min-height: 38px;
        }

        .key-actions {
            display: flex;
            gap: 8px;
        }

        .btn-sm {
            flex: 1;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: opacity var(--transition);
        }

        .btn-sm:hover {
            opacity: .85;
        }

        .btn-edit {
            background: rgba(199, 125, 255, .15);
            color: var(--purple);
            border: 1px solid rgba(199, 125, 255, .3);
        }

        .btn-delete {
            background: rgba(255, 107, 157, .1);
            color: var(--pink);
            border: 1px solid rgba(255, 107, 157, .25);
        }

        /* Users */
        .user-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }

        .user-row:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .user-row-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            flex-shrink: 0;
            background: linear-gradient(135deg, var(--pink), var(--purple));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: .85rem;
        }

        .user-row-info {
            flex: 1;
        }

        .user-row-name {
            font-size: .88rem;
            font-weight: 600;
        }

        .user-row-meta {
            font-size: .75rem;
            color: var(--text-muted);
        }

        .role-badge {
            font-size: .65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .08em;
            padding: 2px 7px;
            border-radius: 100px;
        }

        .role-badge.admin {
            background: rgba(255, 209, 102, .15);
            color: var(--yellow);
        }

        .role-badge.user {
            background: rgba(0, 212, 177, .12);
            color: var(--teal);
        }

        /* Add user form */
        .add-user-form {
            display: none;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }

        .add-user-form.show {
            display: block;
        }

        .mini-input {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 12px;
            color: var(--text);
            font-size: 0.85rem;
            outline: none;
            font-family: 'Inter', sans-serif;
            margin-bottom: 8px;
            transition: border-color var(--transition);
        }

        .mini-input:focus {
            border-color: var(--purple);
        }

        .btn-primary-sm {
            width: 100%;
            background: linear-gradient(135deg, var(--pink), var(--purple));
            border: none;
            color: #fff;
            border-radius: 8px;
            padding: 9px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: .85rem;
        }

        /* Section */
        .section-full {
            margin-bottom: 20px;
        }

        /* Responsive */
        @media (max-width: 1100px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 900px) {
            .content-row {
                grid-template-columns: 1fr;
            }

            .sidebar {
                width: 200px;
            }

            .main {
                margin-left: 200px;
            }
        }
    </style>
</head>

<body>

    <!-- Sidebar -->
    <nav class="sidebar">
        <div class="sidebar-logo">
            <span class="paw">🐾</span>
            <div>
                <div class="sidebar-logo-text">PawTrace <span class="logo-ai">AI</span></div>
                <div class="admin-badge">管理后台</div>
            </div>
        </div>

        <div class="nav-section-label" style="margin-bottom:12px;">导航</div>
        <a class="nav-item active" href="admin.html"><span class="nav-icon">📊</span>概览</a>
        <a class="nav-item" href="index.html"><span class="nav-icon">🎨</span>生成器</a>

        <div class="sidebar-bottom">
            <div class="user-chip">
                <div class="user-avatar" id="sidebarAvatar">A</div>
                <div>
                    <div class="user-name" id="sidebarUser">管理员</div>
                    <div class="user-role">Admin</div>
                </div>
            </div>
            <button class="btn-logout" onclick="logout()">退出登录</button>
        </div>
    </nav>

    <!-- Main -->
    <main class="main">
        <div class="page-header">
            <h1 class="page-title">管理后台 🐾</h1>
            <p class="page-sub" id="welcomeMsg">欢迎回来！查看 PawTrace AI 的使用概览。</p>
        </div>

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card pink">
                <div class="stat-card-icon">✨</div>
                <div class="stat-card-val" id="statTotal">0</div>
                <div class="stat-card-label">总生成次数</div>
            </div>
            <div class="stat-card purple">
                <div class="stat-card-icon">📅</div>
                <div class="stat-card-val" id="statToday">0</div>
                <div class="stat-card-label">今日生成</div>
            </div>
            <div class="stat-card teal">
                <div class="stat-card-icon">👤</div>
                <div class="stat-card-val" id="statUsers">0</div>
                <div class="stat-card-label">账户数量</div>
            </div>
            <div class="stat-card yellow">
                <div class="stat-card-icon">🏆</div>
                <div class="stat-card-val" id="statFavoriteStyle">—</div>
                <div class="stat-card-label">最受欢迎风格</div>
            </div>
        </div>

        <div class="content-row">
            <!-- History -->
            <div class="panel">
                <div class="panel-header">
                    <span class="panel-title">📋 生成历史</span>
                    <button class="panel-action" onclick="clearHistory()">清空记录</button>
                </div>
                <div style="overflow-x:auto;">
                    <table class="history-table" id="historyTable">
                        <thead>
                            <tr>
                                <th>缩略图</th>
                                <th>宠物名</th>
                                <th>风格</th>
                                <th>时间</th>
                            </tr>
                        </thead>
                        <tbody id="historyBody"></tbody>
                    </table>
                    <div class="no-history" id="noHistory" style="display:none">📭 暂无生成记录</div>
                </div>
            </div>

            <!-- Right column -->
            <div style="display:flex;flex-direction:column;gap:20px;">
                <!-- Style chart -->
                <div class="panel">
                    <div class="panel-header">
                        <span class="panel-title">🎨 风格分布</span>
                    </div>
                    <div class="panel-body" style="max-height:220px;">
                        <canvas id="styleChart" height="180"></canvas>
                        <div class="no-history" id="noChart" style="display:none;padding:20px 0">无数据</div>
                    </div>
                </div>

                <!-- API Key -->
                <div class="panel">
                    <div class="panel-header">
                        <span class="panel-title">🔑 API Key</span>
                    </div>
                    <div class="panel-body">
                        <div class="api-key-display" id="apiKeyDisplay">（未设置）</div>
                        <div class="key-actions">
                            <button class="btn-sm btn-edit" onclick="editApiKey()">✏️ 更新</button>
                            <button class="btn-sm btn-delete" onclick="deleteApiKey()">🗑 删除</button>
                        </div>
                    </div>
                </div>

                <!-- Users -->
                <div class="panel">
                    <div class="panel-header">
                        <span class="panel-title">👥 账户管理</span>
                        <button class="panel-action" onclick="toggleAddUser()">+ 添加</button>
                    </div>
                    <div class="panel-body">
                        <div id="userList"></div>
                        <div class="add-user-form" id="addUserForm">
                            <input type="text" class="mini-input" id="newUsername" placeholder="用户名" />
                            <input type="password" class="mini-input" id="newPassword" placeholder="密码（至少 8 位）" />
                            <button class="btn-primary-sm" onclick="addUser()">创建用户</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="admin.js"></script>
</body>

</html>
