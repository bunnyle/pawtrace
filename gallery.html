<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PawTrace AI — 我的画廊</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet" />
    <style>
        :root {
            --bg: #0D0D1A;
            --surface: #141427;
            --surface2: #1C1C35;
            --border: rgba(199, 125, 255, .18);
            --pink: #FF6B9D;
            --purple: #C77DFF;
            --teal: #00D4B1;
            --yellow: #FFD166;
            --text: #F0EEFF;
            --text-muted: #8B87B0;
            --radius: 20px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* Nav */
        .nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 32px;
            background: rgba(20, 20, 39, .8);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Nunito', sans-serif;
            font-weight: 900;
            font-size: 1.1rem;
            text-decoration: none;
            color: var(--text);
        }

        .nav-logo .logo-ai {
            background: linear-gradient(90deg, var(--pink), var(--purple));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .nav-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: .88rem;
            font-weight: 500;
            transition: color var(--transition);
        }

        .nav-link:hover,
        .nav-link.active {
            color: var(--text);
        }

        /* Header */
        .page-header {
            padding: 48px 32px 24px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .page-title {
            font-family: 'Nunito', sans-serif;
            font-weight: 900;
            font-size: 2rem;
        }

        .page-sub {
            color: var(--text-muted);
            margin-top: 6px;
            font-size: .9rem;
        }

        .header-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            align-items: center;
        }

        /* Search */
        .search-input {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 9px 16px;
            color: var(--text);
            font-size: .88rem;
            outline: none;
            width: 240px;
            font-family: 'Inter', sans-serif;
        }

        .search-input:focus {
            border-color: var(--purple);
        }

        .filter-btn {
            padding: 8px 14px;
            border-radius: 8px;
            font-size: .8rem;
            font-weight: 700;
            cursor: pointer;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text-muted);
            font-family: 'Inter', sans-serif;
            transition: all var(--transition);
        }

        .filter-btn.active {
            background: rgba(199, 125, 255, .15);
            color: var(--purple);
            border-color: rgba(199, 125, 255, .3);
        }

        .btn-danger {
            margin-left: auto;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: .82rem;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid rgba(255, 107, 157, .25);
            background: rgba(255, 107, 157, .1);
            color: var(--pink);
            font-family: 'Inter', sans-serif;
        }

        .btn-danger:hover {
            background: rgba(255, 107, 157, .2);
        }

        /* Gallery grid */
        .gallery-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 32px 48px;
        }

        .gallery-count {
            color: var(--text-muted);
            font-size: .82rem;
            margin-bottom: 20px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px;
        }

        .gallery-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            transition: transform var(--transition), box-shadow var(--transition);
            cursor: pointer;
        }

        .gallery-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 16px 40px rgba(0, 0, 0, .4);
            border-color: rgba(199, 125, 255, .3);
        }

        .card-preview {
            aspect-ratio: 1;
            background: var(--surface2);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .card-preview svg {
            width: 100%;
            height: 100%;
            display: block;
            padding: 16px;
        }

        .card-preview .no-svg {
            font-size: 3rem;
        }

        .card-body {
            padding: 14px 16px;
        }

        .card-pet-name {
            font-weight: 700;
            font-size: .92rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-meta {
            font-size: .75rem;
            color: var(--text-muted);
            margin-top: 3px;
        }

        .card-tags {
            display: flex;
            gap: 6px;
            margin-top: 10px;
        }

        .card-tag {
            font-size: .65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .08em;
            padding: 2px 7px;
            border-radius: 100px;
        }

        .card-tag.kawaii {
            background: rgba(255, 107, 157, .15);
            color: var(--pink);
        }

        .card-tag.minimal {
            background: rgba(199, 125, 255, .15);
            color: var(--purple);
        }

        .card-tag.stamp {
            background: rgba(255, 209, 102, .15);
            color: var(--yellow);
        }

        .card-tag.floral {
            background: rgba(129, 199, 132, .15);
            color: #81C784;
        }

        .card-tag.watercolor {
            background: rgba(144, 202, 249, .15);
            color: #64B5F6;
        }

        .card-actions {
            display: flex;
            gap: 8px;
            padding: 0 16px 14px;
        }

        .btn-card {
            flex: 1;
            padding: 7px;
            border-radius: 8px;
            font-size: .78rem;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: opacity var(--transition);
            border: none;
        }

        .btn-card:hover {
            opacity: .8;
        }

        .btn-dl {
            background: linear-gradient(135deg, var(--pink), var(--purple));
            color: #fff;
        }

        .btn-del {
            background: var(--surface2);
            color: var(--text-muted);
        }

        /* Empty */
        .gallery-empty {
            text-align: center;
            padding: 80px 0;
            color: var(--text-muted);
        }

        .gallery-empty .empty-icon {
            font-size: 4rem;
            display: block;
            margin-bottom: 16px;
        }

        .gallery-empty p {
            font-size: .95rem;
        }

        .gallery-empty a {
            color: var(--purple);
            text-decoration: none;
            font-weight: 600;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .7);
            align-items: center;
            justify-content: center;
            z-index: 200;
            padding: 24px;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow: auto;
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
        }

        .modal-title {
            font-family: 'Nunito', sans-serif;
            font-weight: 800;
            font-size: 1.1rem;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.4rem;
            cursor: pointer;
        }

        .modal-body {
            padding: 24px;
        }

        .modal-svg {
            width: 100%;
            border-radius: 12px;
            background: var(--surface2);
            padding: 24px;
        }

        .modal-svg svg {
            width: 100%;
            height: auto;
            display: block;
        }

        .modal-info {
            margin-top: 16px;
            font-size: .85rem;
            color: var(--text-muted);
        }

        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
        }

        .btn-modal {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: .9rem;
            cursor: pointer;
            border: none;
        }

        .btn-modal-primary {
            background: linear-gradient(135deg, var(--pink), var(--purple));
            color: #fff;
        }

        .btn-modal-sec {
            background: var(--surface2);
            color: var(--text-muted);
        }

        /* Responsive */
        @media (max-width:600px) {
            .gallery-grid {
                grid-template-columns: 1fr 1fr;
            }

            .header-actions {
                flex-wrap: wrap;
            }
        }
    </style>
</head>

<body>

    <nav class="nav">
        <a class="nav-logo" href="index.html">🐾 PawTrace <span class="logo-ai">AI</span></a>
        <div class="nav-links">
            <a class="nav-link" href="index.html">🎨 生成器</a>
            <a class="nav-link active" href="gallery.html">🖼 画廊</a>
            <a class="nav-link" href="admin.html" id="adminLink" style="display:none">⚙️ 管理</a>
            <span class="nav-link" id="navUser" style="color:var(--text-muted)"></span>
            <button onclick="logout()" id="logoutBtn"
                style="display:none;background:rgba(255,107,157,.15);border:1px solid rgba(255,107,157,.25);color:var(--pink);border-radius:8px;padding:5px 12px;cursor:pointer;font-size:.8rem;font-family:Inter,sans-serif;font-weight:600;">退出</button>
        </div>
    </nav>

    <div class="page-header">
        <h1 class="page-title">🖼 我的画廊</h1>
        <p class="page-sub">查看并下载你所有生成的宠物 SVG 作品</p>
        <div class="header-actions">
            <input type="text" class="search-input" placeholder="🔍 搜索宠物名..." id="searchInput"
                oninput="filterCards()" />
            <button class="filter-btn active" onclick="setFilter('all',this)">全部</button>
            <button class="filter-btn" onclick="setFilter('kawaii',this)">Chibi 🌸</button>
            <button class="filter-btn" onclick="setFilter('minimal',this)">简约 ✏️</button>
            <button class="filter-btn" onclick="setFilter('stamp',this)">印章 🏮</button>
            <button class="filter-btn" onclick="setFilter('floral',this)">扁平花环 🌿</button>
            <button class="filter-btn" onclick="setFilter('watercolor',this)">水彩插画 🎨</button>
            <button class="btn-danger" onclick="clearAll()">🗑 清空全部</button>
        </div>
    </div>

    <div class="gallery-container">
        <p class="gallery-count" id="galleryCount"></p>
        <div class="gallery-grid" id="galleryGrid"></div>
        <div class="gallery-empty" id="galleryEmpty" style="display:none">
            <span class="empty-icon">📭</span>
            <p>还没有任何作品。<a href="index.html">去生成第一张 SVG →</a></p>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modal" onclick="e => { if(e.target===this) closeModal(); }">
        <div class="modal">
            <div class="modal-header">
                <span class="modal-title" id="modalTitle">预览</span>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-body">
                <div class="modal-svg" id="modalSvg"></div>
                <div class="modal-info" id="modalInfo"></div>
            </div>
            <div class="modal-footer">
                <button class="btn-modal btn-modal-primary" id="modalDl" onclick="modalDownload()">⬇️ 下载 SVG</button>
                <button class="btn-modal btn-modal-sec" onclick="closeModal()">关闭</button>
            </div>
        </div>
    </div>

    <script src="gallery.js"></script>
</body>

</html>
