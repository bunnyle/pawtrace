<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PawTrace AI — 登录</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet" />
    <style>
        :root {
            --bg: #000000;
            --surface: #1C1C1E;
            --surface2: #2C2C2E;
            --border: rgba(255, 255, 255, 0.15);
            --pink: #0A84FF;
            --purple: #5E5CE6;
            --teal: #30D158;
            --text: #FFFFFF;
            --text-muted: rgba(235, 235, 245, 0.6);
            --radius: 18px;
            --transition: 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'SF Pro Text', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Background orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
        }

        .orb-1 {
            width: 500px;
            height: 500px;
            background: rgba(199, 125, 255, 0.12);
            top: -100px;
            left: -100px;
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            background: rgba(255, 107, 157, 0.1);
            bottom: -100px;
            right: -100px;
        }

        .login-wrap {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 440px;
            padding: 24px;
        }

        /* Logo */
        .login-logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-logo .paw {
            font-size: 2.5rem;
            display: block;
            margin-bottom: 8px;
        }

        .logo-text {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
            font-weight: 800;
            font-size: 1.8rem;
            letter-spacing: -0.02em;
        }

        .logo-ai {
            color: var(--text);
        }

        .login-tagline {
            font-size: 0.88rem;
            color: var(--text-muted);
            margin-top: 6px;
        }

        /* Card */
        .login-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 40px;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.4);
        }

        .card-title {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
            font-weight: 800;
            font-size: 1.3rem;
            margin-bottom: 8px;
            text-align: center;
        }

        .card-sub {
            color: var(--text-muted);
            font-size: 0.85rem;
            text-align: center;
            margin-bottom: 28px;
        }

        /* Mode badge */
        .mode-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 4px 12px;
            border-radius: 100px;
            margin: 0 auto 24px;
        }

        .mode-badge.setup {
            color: var(--teal);
            background: rgba(0, 212, 177, 0.12);
            border: 1px solid rgba(0, 212, 177, 0.25);
        }

        .mode-badge.login {
            color: var(--purple);
            background: rgba(199, 125, 255, 0.12);
            border: 1px solid rgba(199, 125, 255, 0.25);
        }

        .mode-badge-wrap {
            text-align: center;
        }

        /* Tabs (Login / Register) */
        .auth-tabs {
            display: flex;
            background: var(--bg);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 24px;
            gap: 4px;
        }

        .auth-tab {
            flex: 1;
            padding: 9px;
            border: none;
            border-radius: 9px;
            font-family: 'Inter', sans-serif;
            font-size: 0.88rem;
            font-weight: 600;
            cursor: pointer;
            background: transparent;
            color: var(--text-muted);
            transition: background var(--transition), color var(--transition);
        }

        .auth-tab.active {
            background: var(--surface2);
            color: var(--text);
        }

        /* Form */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.82rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 16px;
            color: var(--text);
            font-size: 0.95rem;
            outline: none;
            font-family: 'Inter', sans-serif;
            transition: border-color var(--transition), box-shadow var(--transition);
        }

        .form-input:focus {
            border-color: var(--pink);
        }

        .form-input::placeholder {
            color: var(--text-muted);
        }

        .password-wrap {
            position: relative;
        }

        .toggle-pw {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1rem;
            padding: 4px;
            transition: color var(--transition);
        }

        .toggle-pw:hover {
            color: var(--text);
        }

        .btn-login {
            width: 100%;
            background: var(--text);
            color: var(--bg);
            border: none;
            border-radius: 999px;
            padding: 14px;
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 8px;
            transition: opacity var(--transition), transform var(--transition);
        }

        .btn-login:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .btn-login:active {
            transform: scale(0.97);
        }

        .btn-login:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Error */
        .login-error {
            display: none;
            background: rgba(255, 107, 157, 0.12);
            border: 1px solid rgba(255, 107, 157, 0.3);
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 0.85rem;
            color: var(--pink);
            margin-bottom: 20px;
            text-align: center;
        }

        .login-error.show {
            display: block;
        }

        /* Hint */
        .login-hint {
            text-align: center;
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-top: 20px;
        }

        .login-hint a {
            color: var(--purple);
            text-decoration: none;
        }

        .login-hint a:hover {
            text-decoration: underline;
        }

        /* Loading spinner */
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }
    </style>
</head>

<body>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="login-wrap">
        <!-- Logo -->
        <div class="login-logo">
            <span class="paw">🐾</span>
            <div class="logo-text">PawTrace <span class="logo-ai">AI</span></div>
            <div class="login-tagline">把毛孩变成永恒的木刻艺术</div>
        </div>

        <!-- Card -->
        <div class="login-card">
            <!-- First-time setup mode badge -->
            <div class="mode-badge-wrap" id="setupBadgeWrap" style="display:none">
                <span class="mode-badge setup">⚙️ 初始设置 — 创建管理员账户</span>
            </div>

            <!-- Login / Register tabs (shown when users exist) -->
            <div class="auth-tabs" id="authTabs" style="display:none">
                <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">🔑 登录</button>
                <button class="auth-tab" id="tabRegister" onclick="switchTab('register')">✨ 注册新账户</button>
            </div>

            <div class="login-error" id="loginError"></div>

            <!-- LOGIN FORM -->
            <form id="loginForm" onsubmit="handleSubmit(event)" style="display:none">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" class="form-input" placeholder="输入用户名" autocomplete="username"
                        required />
                </div>
                <div class="form-group">
                    <label for="password">密码</label>
                    <div class="password-wrap">
                        <input type="password" id="password" class="form-input" placeholder="输入密码"
                            autocomplete="current-password" required />
                        <button type="button" class="toggle-pw" onclick="togglePassword('password')">👁</button>
                    </div>
                </div>
                <button type="submit" class="btn-login" id="submitBtn">登录 →</button>
                <p class="login-hint" style="margin-top:16px">
                    忘记密码？<a href="javascript:resetAccount()">重置所有数据</a>
                </p>
            </form>

            <!-- SETUP FORM (first-time admin creation) -->
            <form id="setupForm" onsubmit="handleSetupSubmit(event)" style="display:none">
                <div class="form-group">
                    <label>管理员用户名</label>
                    <input type="text" id="setupUsername" class="form-input" placeholder="设置用户名" autocomplete="username"
                        required />
                </div>
                <div class="form-group">
                    <label>确认用户名</label>
                    <input type="text" id="setupUsernameConfirm" class="form-input" placeholder="再次输入用户名"
                        autocomplete="username" />
                </div>
                <div class="form-group">
                    <label>密码（至少 8 位）</label>
                    <div class="password-wrap">
                        <input type="password" id="setupPassword" class="form-input" placeholder="设置密码"
                            autocomplete="new-password" required />
                        <button type="button" class="toggle-pw" onclick="togglePassword('setupPassword')">👁</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>确认密码</label>
                    <div class="password-wrap">
                        <input type="password" id="setupPasswordConfirm" class="form-input" placeholder="再次输入密码"
                            autocomplete="new-password" />
                        <button type="button" class="toggle-pw"
                            onclick="togglePassword('setupPasswordConfirm')">👁</button>
                    </div>
                </div>
                <button type="submit" class="btn-login" id="setupBtn">创建管理员账户 →</button>
            </form>

            <!-- REGISTER FORM -->
            <form id="registerForm" onsubmit="handleRegisterSubmit(event)" style="display:none">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="regUsername" class="form-input" placeholder="设置用户名（至少 2 位）"
                        autocomplete="username" required />
                </div>
                <div class="form-group">
                    <label>密码（至少 8 位）</label>
                    <div class="password-wrap">
                        <input type="password" id="regPassword" class="form-input" placeholder="设置密码"
                            autocomplete="new-password" required />
                        <button type="button" class="toggle-pw" onclick="togglePassword('regPassword')">👁</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>确认密码</label>
                    <div class="password-wrap">
                        <input type="password" id="regPasswordConfirm" class="form-input" placeholder="再次输入密码"
                            autocomplete="new-password" />
                        <button type="button" class="toggle-pw"
                            onclick="togglePassword('regPasswordConfirm')">👁</button>
                    </div>
                </div>
                <button type="submit" class="btn-login">注册并登录 →</button>
            </form>
        </div>
    </div>

    <script src="login.js"></script>
</body>

</html>
